name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: cache rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install frontend dependencies
        run: bun install

      - name: get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: generate release notes
        id: release_notes
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.tag }}"
          if [ -n "$PREV_TAG" ]; then
            {
              echo 'body<<EOF'
              git log "$PREV_TAG"..HEAD --pretty=format:"- %s"
              echo ""
              echo ""
              echo "**Full Changelog**: https://github.com/addisonking/synaptic/compare/$PREV_TAG...$GITHUB_REF_NAME"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "body=Initial release" >> $GITHUB_OUTPUT
          fi

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "synaptic ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: "--target universal-apple-darwin"

      - name: publish release
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release edit "${{ github.ref_name }}" --draft=false
          else
            gh release create "${{ github.ref_name }}" \
              --title "synaptic ${{ github.ref_name }}" \
              --notes "${{ steps.release_notes.outputs.body }}" \
              --draft=false \
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
